# Manual Docker image publish to GitHub Container Registry (ghcr.io).
# Specify a version tag or leave empty to use the version from pom.xml.
# After the first publish, make the package public:
#   GitHub → repository → Packages → open-daimon → Settings → Change visibility → Public

name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.2.3). Leave empty to use version from pom.xml.'
        required: false
        type: string
      push_latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: true

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout -pl opendaimon-app)
            echo "version=${VER%-SNAPSHOT}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $(grep '^version=' "$GITHUB_OUTPUT" | cut -d= -f2-)"

      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}:latest', steps.image.outputs.name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
