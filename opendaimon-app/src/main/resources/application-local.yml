# Local profile: only overrides vs application.yml (inherits include-model-ids, etc.)

open-daimon:
  ai:
    spring-ai:
      openrouter-auto-rotation:
        models:
          enabled: false
          refresh-initial-delay: 1s
          refresh-interval: 10m
        ranking:
          cooldown429: 5m
          cooldown5xx: 2m
          cooldown404: 1h
      models:
        list:
          - name: "qwen3.5:4b"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - SUMMARIZATION
              - WEB
            provider-type: OLLAMA
            priority: 1
          - name: "gemma3:4b"
            capabilities:
              - VISION
              - CHAT
            provider-type: OLLAMA
            priority: 1
            max-output-tokens: 16384
          - name: "nomic-embed-text:v1.5"
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1

logging:
  level:
    io.github.ngirchev.opendaimon.telegram.TelegramBot: INFO
    io.github.ngirchev.opendaimon.ai.springai: WARN
    io.github.ngirchev.opendaimon.ai.springai.agent.SpringAgentLoopActions: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.rest: WARN
    io.github.ngirchev.opendaimon.ai.springai.rest.WebClientLogCustomizer: WARN
    io.github.ngirchev.opendaimon.ai.springai.config: WARN
    io.github.ngirchev.opendaimon.telegram.command.handler.impl.fsm.TelegramMessageHandlerActions: WARN
    org.springframework.ai.chat.model.MessageAggregator: WARN
    io.github.ngirchev.opendaimon.telegram.service.PersistentKeyboardService: INFO
