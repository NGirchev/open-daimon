# Local profile: only overrides vs application.yml (inherits include-model-ids, etc.)

open-daimon:
  ai:
    spring-ai:
      openrouter-auto-rotation:
        models:
          enabled: false
          refresh-initial-delay: 1s
          refresh-interval: 10m
        ranking:
          cooldown429: 5m
          cooldown5xx: 2m
          cooldown404: 1h
      models:
        list:
          - name: "gemma3:1b"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - SUMMARIZATION
              - VISION
              - WEB
            provider-type: OLLAMA
            priority: 1
            max-reasoning-tokens: 0  # Ollama does not support reasoning parameter
            think: false  # Disable Qwen3 thinking mode — prevents token budget exhaustion that causes empty responses
          - name: "nomic-embed-text:v1.5"
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1

logging:
  level:
    io.github.ngirchev.opendaimon.ai.springai.rest: INFO
    io.github.ngirchev.opendaimon.ai.springai.rest.WebClientLogCustomizer: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.config: INFO
    org.springframework.ai.chat.model.MessageAggregator: WARN
    io.github.ngirchev.opendaimon.telegram.service.PersistentKeyboardService: DEBUG
