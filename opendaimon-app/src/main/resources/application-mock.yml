server:
  port: 8080

open-daimon:
  common:
    bulkhead:
      enabled: true
      instances:
        ADMIN:
          maxConcurrentCalls: 10
          maxWaitDuration: 1s
        VIP:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
        REGULAR:
          maxConcurrentCalls: 1
          maxWaitDuration: 500ms
    admin:
      enabled: ${ADMIN_ENABLED:true}
      telegram-id: ${ADMIN_TELEGRAM_ID:}
      rest-email: ${ADMIN_REST_EMAIL:}
    assistant-role: role.content.default
    max-output-tokens: 1000
    max-user-message-tokens: 4000
    max-total-prompt-tokens: 32000
  telegram:
    enabled: true
    username: ${TELEGRAM_USERNAME}
    token: ${TELEGRAM_TOKEN}
    commands:
      start-enabled: true
      role-enabled: true
      message-enabled: true
      bugreport-enabled: true
      newthread-enabled: true
      history-enabled: true
      threads-enabled: true
    message-coalescing:
      enabled: true
      wait-window-ms: 1200
      max-leading-text-length: 160
      allow-media-second-message: true
      require-explicit-link: true
  rest:
    enabled: true
  ui:
    enabled: true
  ai:
    spring-ai:
      enabled: false
      openrouter-auto-rotation:
        models:
          enabled: false
    gateway-mock:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: metrics,prometheus
  endpoint:
    metrics:
      enabled: true

spring:
  ai:
    openai:
      api-key: "mock-key"  # Dummy key to disable Spring AI in mock profile
    ollama:
      base-url: "http://localhost:9999"  # Dummy URL to disable Ollama in mock profile
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opendaimon}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

logging:
  level:
    root: INFO
    io.github.ngirchev.opendaimon: DEBUG
