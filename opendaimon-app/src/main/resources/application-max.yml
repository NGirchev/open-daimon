open-daimon:
  common:
    # Max profile: increased token limits
    max-total-prompt-tokens: 128000
    max-user-message-tokens: 16000
    max-output-tokens: 16000
    max-reasoning-tokens: 8000
    summarization:
      max-window-tokens: 64000
      max-output-tokens: 12000
  ai:
    spring-ai:
      openrouter-auto-rotation:
        whitelist:
          - roles: [ ADMIN, VIP ]
            include-contains:
              - openai/gpt-4.1
              - google/gemini-2.5-pro
              - deepseek/deepseek-r2
              - openai/gpt-5.4
              - openai/gpt-5-nano
              - z-ai/glm-5-turbo
              - google/gemma-3-4b
              - qwen/qwen3-4b
              - qwen/qwen3-vl-235b-a22b-thinking
              - qwen/qwen3-vl-30b-a3b-thinking
          - roles: [ ADMIN, REGULAR ]
            include-model-ids:
              - google/gemma-3-27b-it:free
              - qwen/qwen3-next-80b-a3b-instruct:free
              - z-ai/glm-4.5-air:free
              - tngtech/tng-r1t-chimera:free
              - arcee-ai/trinity-large-preview:free
              - arcee-ai/trinity-mini:free
              - cognitivecomputations/dolphin-mistral-24b-venice-edition:free
              - google/gemma-3-12b-it:free
              - google/gemma-3n-e2b-it:free
              - google/gemma-3n-e4b-it:free
              - liquid/lfm-2.5-1.2b-instruct:free
              - liquid/lfm-2.5-1.2b-thinking:free
              - meta-llama/llama-3.2-3b-instruct:free
              - nousresearch/hermes-3-llama-3.1-405b:free
              - qwen/qwen3-4b:free
              - stepfun/step-3.5-flash:free
      models:
        list:
          - name: "openrouter/auto"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - WEB
              - SUMMARIZATION
              - EMBEDDING
              - VISION
            provider-type: OPENAI
            priority: 3
            allowed-roles:
              - ADMIN
              - VIP
          # Max profile: top paid models
          - name: "openai/gpt-4.1"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - VISION
              - STRUCTURED_OUTPUT
            provider-type: OPENAI
            priority: 3
            allowed-roles:
              - ADMIN
              - VIP
          - name: "google/gemini-2.5-pro"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - VISION
              - STRUCTURED_OUTPUT
            provider-type: OPENAI
            priority: 3
            max-reasoning-tokens: 8000
            allowed-roles:
              - ADMIN
              - VIP
          - name: "deepseek/deepseek-r2"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - STRUCTURED_OUTPUT
            provider-type: OPENAI
            priority: 3
            max-reasoning-tokens: 8000
            allowed-roles:
              - ADMIN
              - VIP
          - name: "z-ai/glm-4.5v"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - EMBEDDING
              - VISION
            provider-type: OPENAI
            priority: 2
            allowed-roles:
              - ADMIN
              - VIP
          # qwen3.5 with thinking enabled (max profile only)
          - name: "qwen3.5"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - VISION
              - WEB
              - SUMMARIZATION
            provider-type: OLLAMA
            priority: 1
            max-output-tokens: 16000  # must fit reasoning + reply: num_predict = 16000 + 8000 = 24000
            max-reasoning-tokens: 8000
            think: true
          - name: "qwen3-embedding:8b"
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1
          - name: "openrouter/free"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - WEB
              - EMBEDDING
              - VISION
            provider-type: OPENAI
            priority: 3
            allowed-roles:
              - ADMIN
              - REGULAR
          - name: "meta-llama/llama-3.3-70b-instruct:free"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - STRUCTURED_OUTPUT
              - VISION
              - FREE
            provider-type: OPENAI
            priority: 1
            allowed-roles:
              - ADMIN
              - REGULAR
          - name: "mistralai/mistral-small-3.1-24b-instruct:free"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - STRUCTURED_OUTPUT
              - VISION
              - FREE
            provider-type: OPENAI
            priority: 1
            allowed-roles:
              - ADMIN
              - REGULAR
          - name: "google/gemini-2.0-flash-exp:free"
            capabilities:
              - CHAT
              - TOOL_CALLING
              - WEB
              - STRUCTURED_OUTPUT
              - VISION
              - FREE
            provider-type: OPENAI
            priority: 1
