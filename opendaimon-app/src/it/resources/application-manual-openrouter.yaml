# Dedicated overrides for manual OpenRouter integration tests.
# Requires OPENROUTER_KEY in .env. No local Ollama needed.

spring:
  main:
    banner-mode: off
  ai:
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_KEY:sk-placeholder}
  autoconfigure:
    exclude:
      - io.github.ngirchev.opendaimon.rest.config.RestAutoConfig
      - io.github.ngirchev.opendaimon.ui.config.UIAutoConfig
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaAutoConfiguration

open-daimon:
  common:
    # Raise summarization threshold so 3-turn conversation tests do not trigger
    # SummarizationService — which otherwise calls OpenRouter with a default
    # max_price=0 and receives HTTP 404 "No endpoints found that satisfy the
    # max price for this request", causing the turn to error and leaving the
    # conversation with fewer assistant messages than asserted.
    summarization:
      message-window-size: 100
      max-window-tokens: 200000
    bulkhead:
      enabled: true
      instances:
        ADMIN:
          maxConcurrentCalls: 10
          maxWaitDuration: 1s
        VIP:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
        REGULAR:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
    chat-routing:
      REGULAR:
        max-price: 5.0
  telegram:
    enabled: true
    token: test-token
    username: test-bot
    start-message: Manual test bot
    max-message-length: 4096
    file-upload:
      enabled: false
      max-file-size-mb: 20
      supported-image-types: jpeg,png,gif,webp
      supported-document-types: pdf,docx,doc,xls,xlsx,txt,rtf,html,csv
    access:
      ADMIN:
        ids:
          - 350009004
          - 350009005
          - 350009006
          - 350009008
          - 350009010
        channels: []
      VIP:
        channels: []
      REGULAR:
        channels: []
  ai:
    gateway-mock:
      enabled: false
    spring-ai:
      enabled: true
      mock: false
      openrouter-auto-rotation:
        models:
          enabled: false
      rag:
        enabled: true
        chunk-size: 800
        chunk-overlap: 100
        top-k: 5
        similarity-threshold: 0.0
        prompts:
          document-extract-error-pdf: "Could not extract text from file \"%s\"."
          document-extract-error-document: "Could not extract text from file \"%s\" (type: %s)."
          augmented-prompt-template: |
            Based on the following context from the document, answer the user's question.
            Context:
            %s

            Question: %s
          vision-extraction-prompt: "Extract all readable text from this image. Return only the extracted text, no commentary."
      serper:
        api:
          key: test-key
          url: https://google.serper.dev/search
      models:
        list:
          - name: "openrouter/auto"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - WEB
              - SUMMARIZATION
              - VISION
            provider-type: OPENAI
            priority: 1
          - name: "intfloat/multilingual-e5-large"
            capabilities:
              - EMBEDDING
            provider-type: OPENAI
            priority: 1

logging:
  level:
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIGateway: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIChatService: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIPromptFactory: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.rest.WebClientLogCustomizer: DEBUG
