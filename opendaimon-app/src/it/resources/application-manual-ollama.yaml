# Dedicated overrides for manual Ollama integration tests (PDF+RAG, web tool calling, etc.).

spring:
  main:
    banner-mode: off
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

open-daimon:
  common:
    # Raise summarization threshold so 3-turn conversation tests keep full
    # history in context instead of compressing into a summary — small models
    # (qwen2.5:3b) lose the ability to recall specific facts (e.g. lucky
    # number) when the history is replaced by a generated summary.
    summarization:
      message-window-size: 100
      max-window-tokens: 200000
    bulkhead:
      enabled: true
      instances:
        ADMIN:
          maxConcurrentCalls: 10
          maxWaitDuration: 1s
        VIP:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
        REGULAR:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
  telegram:
    enabled: true
    token: test-token
    username: test-bot
    file-upload:
      enabled: false
    access:
      ADMIN:
        channels: []
      VIP:
        channels: []
      REGULAR:
        channels: []
  agent:
    stream-timeout-seconds: 600
  ai:
    gateway-mock:
      enabled: false
    spring-ai:
      enabled: true
      mock: false
      timeouts:
        response-timeout-seconds: 600
      openrouter-auto-rotation:
        models:
          enabled: false
      rag:
        enabled: true
        similarity-threshold: 0.0
      serper:
        api:
          key: test-key
          url: https://google.serper.dev/search
      models:
        list:
          # Default chat model qwen2.5:3b does NOT support Ollama's `think` parameter
          # (Ollama returns HTTP 400 "does not support thinking" when think=true is
          # forwarded). Keep capabilities and think flag aligned with the smallest
          # supported model; override via -Dmanual.ollama.chat-model=<thinking-model>
          # plus a custom profile yaml if a thinking-capable model is required.
          - name: ${manual.ollama.chat-model:qwen2.5:3b}
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - WEB
              - SUMMARIZATION
            provider-type: OLLAMA
            priority: 1
            think: false
            max-reasoning-tokens: 4000
          - name: ${manual.ollama.vision-model:gemma3:4b}
            capabilities:
              - CHAT
              - VISION
            provider-type: OLLAMA
            priority: 1
            max-output-tokens: 16384
          - name: nomic-embed-text:v1.5
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1

logging:
  level:
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIGateway: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIChatService: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIPromptFactory: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.tool.WebTools: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.rest.WebClientLogCustomizer: DEBUG
