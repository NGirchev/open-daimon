# Dedicated overrides for manual Ollama integration tests (PDF+RAG, web tool calling, etc.).

spring:
  main:
    banner-mode: off
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

open-daimon:
  common:
    bulkhead:
      enabled: true
      instances:
        ADMIN:
          maxConcurrentCalls: 10
          maxWaitDuration: 1s
        VIP:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
        REGULAR:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
  telegram:
    enabled: true
    token: test-token
    username: test-bot
    file-upload:
      enabled: false
    access:
      ADMIN:
        channels: []
      VIP:
        channels: []
      REGULAR:
        channels: []
  ai:
    gateway-mock:
      enabled: false
    spring-ai:
      enabled: true
      mock: false
      openrouter-auto-rotation:
        models:
          enabled: false
      rag:
        enabled: true
        similarity-threshold: 0.0
      serper:
        api:
          key: test-key
          url: https://google.serper.dev/search
      models:
        list:
          - name: ${manual.ollama.chat-model:qwen2.5:3b}
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - WEB
              - SUMMARIZATION
            provider-type: OLLAMA
            priority: 1
          - name: ${manual.ollama.vision-model:gemma3:4b}
            capabilities:
              - CHAT
              - VISION
            provider-type: OLLAMA
            priority: 1
            max-output-tokens: 16384
          - name: nomic-embed-text:v1.5
            capabilities:
              - EMBEDDING
            provider-type: OLLAMA
            priority: 1

logging:
  level:
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIGateway: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIChatService: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.service.SpringAIPromptFactory: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.tool.WebTools: DEBUG
    io.github.ngirchev.opendaimon.ai.springai.rest.WebClientLogCustomizer: DEBUG
