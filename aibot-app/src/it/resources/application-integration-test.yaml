# Shared configuration for integration tests
# Use with @ActiveProfiles("integration-test")

spring:
  ai:
    openai:
      api-key: ${OPENROUTER_KEY:}
      base-url: https://openrouter.ai/api
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  # Disable unneeded autoconfig for tests (do not exclude SpringAIAutoConfig — needed for authorotation in IT)
  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.memory.autoconfigure.ChatMemoryAutoConfiguration
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

# ai-bot settings for integration tests
ai-bot:
  telegram:
    token: test-token
    username: test-bot
    start-message: Hello from integration test
    file-upload:
      enabled: false
      max-file-size-mb: 10
      supported-image-types: jpeg,png,gif,webp,svg,bmp,tiff
      supported-document-types: pdf,txt,docx,doc,xls,xlsx,ppt,pptx,odt,ods,odp,rtf,html,md,csv,json,xml,epub
  common:
    bulkhead:
      enabled: true
    max-output-tokens: 1000
    max-reasoning-tokens: 500
    max-user-message-tokens: 4000
    max-total-prompt-tokens: 32000
    summarization:
      max-context-tokens: 1000
      summary-trigger-threshold: 0.7
      keep-recent-messages: 1
      prompt: "You are an assistant. Create a summary in JSON. Conversation:"
    manual-conversation-history:
      enabled: false
      max-response-tokens: 500
      default-window-size: 1
      include-system-prompt: true
      token-estimation-chars-per-token: 4
  ai:
    spring-ai:
      enabled: true
      openrouter-auto-rotation:
        models:
          enabled: true  # for integration tests — verify full path with rotation
          api:
            key: ${OPENROUTER_KEY:}
            url: https://openrouter.ai/api
          refresh-initial-delay: 5s
          refresh-interval: 1h
          filters:
            include-model-ids:
              - meta-llama/llama-3.3-70b-instruct:free
              - mistralai/mistral-small-3.1-24b-instruct:free
          ranking:
            enabled: true
            retry-max-attempts: 3
            latency-ewma-alpha: 0.2
            cooldown429: 10m
            cooldown5xx: 5m
      mock: false
      history-window-size: 10
      timeouts:
        response-timeout-seconds: 120
        stream-timeout-seconds: 120
      serper:
        api:
          key: test-key
          url: https://google.serper.dev/search
      rag:
        enabled: false
        chunk-size: 800
        chunk-overlap: 100
        top-k: 5
        similarity-threshold: 0.7
        prompts:
          document-extract-error-pdf: "Could not extract text from file \"%s\". The file may be a scan or image."
          document-extract-error-document: "Could not extract text from file \"%s\" (type: %s)."
          augmented-prompt-template: "Context:\n%s\n\nQuestion: %s"
      # Models for test - use openrouter/auto with free max_price
      models:
        list:
          - name: openrouter/auto
            capabilities:
              - AUTO
              - CHAT
              - VISION
            provider-type: OPENAI
            priority: 1
