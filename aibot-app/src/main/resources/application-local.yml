server:
  port: 8080

ai-bot:
  common:
    bulkhead:
      enabled: true
      instances:
        ADMIN:
          maxConcurrentCalls: 10
          maxWaitDuration: 1s
        VIP:
          maxConcurrentCalls: 5
          maxWaitDuration: 1s
        REGULAR:
          maxConcurrentCalls: 1
          maxWaitDuration: 500ms
    admin:
      enabled: ${ADMIN_ENABLED:true}
      telegram-id: ${ADMIN_TELEGRAM_ID:}
      rest-email: ${ADMIN_REST_EMAIL:}
    assistant-role: "You are a helpful assistant, who talks with an old person and trying to help with new difficult world. You need to check your answers, because you shouldn't give an bad, wrong advises. Also, you prefer to answer shortly, without extra details if you were not asked about it. Also you are speaking only in Russian language."
    max-total-prompt-tokens: 32000
    # Max tokens per user message; can reject with hint to shorten if exceeded.
    max-user-message-tokens: 4000
    # Total output token limit (max_tokens): reasoning + reply fit in this limit.
    max-output-tokens: 4000
    # Reasoning budget (part of total; must be < max-output-tokens). Optional.
    max-reasoning-tokens: 1500
    summarization:
      max-context-tokens: 8000
      summary-trigger-threshold: 0.7
      keep-recent-messages: 20
    manual-conversation-history:
      enabled: false
      max-response-tokens: 4000
      default-window-size: 20
      include-system-prompt: true
      token-estimation-chars-per-token: 4
  telegram:
    enabled: true
    username: ${TELEGRAM_USERNAME}
    token: ${TELEGRAM_TOKEN}
    whitelist-exceptions: ${WHITELIST_EXCEPTIONS:}
    whitelist-channel-id-exceptions: ${WHITELIST_CHANNEL_ID_EXCEPTIONS:}
    commands:
      start-enabled: true
      role-enabled: true
      message-enabled: true
      bugreport-enabled: true
      newthread-enabled: true
      history-enabled: true
      threads-enabled: true
  rest:
    enabled: true
  ui:
    enabled: true
  ai:
    spring-ai:
      enabled: true
      openrouter-auto-rotation:
        max-attempts: 3
        models:
          enabled: true
          api:
            key: ${OPENROUTER_KEY}
            url: https://openrouter.ai/api
          refresh-initial-delay: 1s
          refresh-interval: 10m
          filters:
            include-model-ids:
              - meta-llama/llama-3.3-70b-instruct:free
              - mistralai/mistral-small-3.1-24b-instruct:free
              - google/gemini-2.0-flash-exp:free
              - google/gemma-3-27b-it:free
              - openai/gpt-oss-120b:free
              - openai/gpt-oss-20b:free
              - qwen/qwen3-next-80b-a3b-instruct:free
              - z-ai/glm-4.5-air:free
              - tngtech/tng-r1t-chimera:free
          ranking:
            enabled: true
            retry-max-attempts: 3
            latency-ewma-alpha: 0.2
            cooldown429: 5m
            cooldown5xx: 2m
      serper:
        api:
          url: "https://google.serper.dev/search"
          key: ${SERPER_KEY}
      mock: false
      history-window-size: 20
      timeouts:
        response-timeout-seconds: 600  # 10 min for HTTP requests to AI providers
        stream-timeout-seconds: 600    # 10 min for streaming
      models:
        list:
          - name: "openrouter/auto"
            capabilities:
              - AUTO
              - CHAT
              - TOOL_CALLING
              - SUMMARIZATION
              - EMBEDDING
              - VISION
            provider-type: OPENAI
            priority: 3
#          - name: "gemma3:1b"
#            capabilities:
#              - AUTO
#              - CHAT
#              - TOOL_CALLING
#              - SUMMARIZATION
#              - EMBEDDING
#            provider-type: OLLAMA
#            priority: 1
#          - name: "nomic-embed-text:v1.5"
#            capabilities:
#              - EMBEDDING
#            provider-type: OLLAMA
#            priority: 1

management:
  endpoints:
    web:
      exposure:
        include: metrics,prometheus
  endpoint:
    metrics:
      enabled: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_bot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: "llama3.2:latest"
      embedding:
        model: "nomic-embed-text:v1.5"
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_KEY:}
      chat:
        options:
          model: ${OPENROUTER_MODEL:tngtech/deepseek-r1t2-chimera:free}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

logging:
  level:
    root: INFO
    io.github.ngirchev.aibot: INFO
    io.github.ngirchev.aibot.ai.springai.rest: INFO
    io.github.ngirchev.aibot.ai.springai.rest.WebClientLogCustomizer: DEBUG
    io.github.ngirchev.aibot.ai.springai.config: INFO
    org.springframework.ai.chat.model.MessageAggregator: WARN
    reactor.core.publisher: WARN
    org.springframework.web.reactive.function.client: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    exception-conversion-word: "%ex{short}"
