<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDaimon Chat</title>
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Chats</h1>
            <button id="newChatBtn" class="primary">New chat</button>
        </div>
        <ul id="sessionList" class="session-list"></ul>
        <div class="sidebar-footer">
            <div id="userEmail" class="user-email"></div>
            <button id="logoutBtn" class="secondary">Log out</button>
        </div>
    </aside>
    <main class="chat">
        <div class="chat-header">
            <div class="title">
                <span id="chatTitle">New chat</span>
            </div>
            <div class="actions">
                <button id="deleteChatBtn" class="danger" disabled>Delete chat</button>
            </div>
        </div>
        <div id="messages" class="messages" aria-live="polite"></div>
        <form id="messageForm" class="composer" autocomplete="off">
            <textarea id="messageInput" rows="1" placeholder="Type a message… (Enter — send, Shift+Enter — new line)"></textarea>
            <button id="sendBtn" type="submit" class="primary">Send</button>
        </form>
    </main>
</div>
<script src="/js/chat.js" defer></script>
</body>
</html>
