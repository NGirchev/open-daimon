# Run "mvn test" (or "mvn verify") before Sonar analysis so JaCoCo reports are generated; with exclusions, effective coverage is >60%.
sonar.projectKey=NGirchev_ai-bot
sonar.organization=ngirchev
sonar.sources=src/main/java
sonar.tests=src/test/java
